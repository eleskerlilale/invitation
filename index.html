<!DOCTYPE html>
<html lang="az">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invitation</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            height: 100vh;
            overflow: hidden;
            font-family: sans-serif;
            background: rgb(255, 255, 255);
        }

        .intro {
            position: relative;
            width: 100%;
            height: 100vh;
        }

        video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* filter: brightness(0.7); */
        }

        /* overlay text */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
            cursor: pointer;
            transition: opacity 0.6s ease;
            /* ƏSAS FIX */
        }

        .overlay h1 {
            font-size: 32px;
            margin-bottom: 10px;
            animation: fade 2s infinite;
        }

        .overlay p {
            font-size: 18px;
            opacity: 0.8;
        }

        /* fade animasiya */
        @keyframes fade {
            0% {
                opacity: 0.4;
            }

            50% {
                opacity: 1;
            }

            100% {
                opacity: 0.4;
            }
        }

        /* keçid effekti */
        .fade-out {
            animation: fadeOut 1s forwards;
        }

        @keyframes fadeOut {
            to {
                opacity: 0;
            }
        }
    </style>
</head>

<body>

    <div class="intro">

        <video id="introVideo" playsinline webkit-playsinline>
            <source src="mektub.mp4" type="video/mp4">
        </video>

        <div class="overlay">
            <h1>Məktub açılır...</h1>
            <p>Klik et</p>
        </div>

    </div>

    <script>
        const video = document.getElementById("introVideo");
        const overlay = document.querySelector(".overlay");

        // kliklə video başlasın
        overlay.addEventListener("click", () => {
            video.play();

            // 🔊 audio icazəsi (iOS üçün kritik)
            const audio = new Audio("music.mp3");
            audio.play().then(() => {
                audio.pause();                 // səsi dərhal dayandır
                localStorage.setItem("musicAllowed", "true");
            }).catch(() => { });

            // overlay gizlə
            overlay.style.opacity = "0";
            setTimeout(() => overlay.style.display = "none", 600);
        });

        // const audio = new Audio("music.mp3");
        // audio.play().then(() => {
        //     localStorage.setItem("musicAllowed", "true");
        // }).catch(() => { });
        // video.muted = true;
        // video.play();

        // overlay.style.display = "none";
        // video bitəndə keçid
        video.addEventListener("ended", () => {
            document.body.classList.add("fade-out");

            setTimeout(() => {
                window.location.href = "main.html";
            }, 1000);
        });
    </script>

</body>

</html>
